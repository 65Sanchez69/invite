<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Пойдем гулять?</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
    }
    h1 {
      font-size: 2.5em;
      color: #fff;
      margin-bottom: 30px;
      text-shadow: 2px 2px 5px rgba(0,0,0,0.3);
    }
    .btn {
      font-size: 1.2em;
      padding: 12px 25px;
      margin: 10px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      background: #ff6f91;
      color: #fff;
      transition: transform 0.2s, background 0.3s;
    }
    .btn:hover {
      transform: scale(1.1);
      background: #ff3f6c;
    }
    #gif {
      margin-top: 20px;
      display: none;
      animation: fadeIn 1s ease forwards;
    }
    #gif img {
      max-width: 90%;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.3);
    }
    @keyframes fadeIn {
      from {opacity: 0;}
      to {opacity: 1;}
    }
  </style>
</head>
<body>
  <h1>Пойдем гулять?</h1>
  <button class="btn" id="yes1">Да</button>
  <button class="btn" id="yes2">Да</button>

  <div id="gif">
    <img src="ura.gif" alt="Ура победа!">
  </div>

  <script>
    const yes1 = document.getElementById("yes1");
    const yes2 = document.getElementById("yes2");
    const gif = document.getElementById("gif");

    function showGif() {
      gif.style.display = "block";
    }

    yes1.addEventListener("click", showGif);
    yes2.addEventListener("click", showGif);
  </script>
</body>
</html>
